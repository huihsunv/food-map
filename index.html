<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>美食地圖</title>
<style>
  :root {
    --primary: #e85d04;
    --primary-light: #f48c06;
    --primary-dark: #dc2f02;
    --bg: #fdf6f0;
    --card-bg: #ffffff;
    --text: #2b2d42;
    --text-light: #6c757d;
    --border: #e9ecef;
    --shadow: 0 2px 12px rgba(0,0,0,0.08);
    --radius: 12px;
    --visited: #2d6a4f;
    --want: #e76f51;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans TC", sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
  }

  header {
    background: linear-gradient(135deg, var(--primary), var(--primary-light));
    color: white;
    padding: 28px 20px 24px;
    text-align: center;
    position: sticky;
    top: 0;
    z-index: 100;
    box-shadow: 0 4px 20px rgba(232,93,4,0.25);
  }

  header h1 {
    font-size: 1.8rem;
    font-weight: 700;
    letter-spacing: 2px;
  }

  header p {
    font-size: 0.9rem;
    opacity: 0.9;
    margin-top: 4px;
  }

  .container {
    max-width: 800px;
    margin: 0 auto;
    padding: 20px 16px 100px;
  }

  /* Search */
  .search-bar {
    position: relative;
    margin-bottom: 20px;
  }

  .search-bar input {
    width: 100%;
    padding: 14px 18px 14px 46px;
    border: 2px solid var(--border);
    border-radius: var(--radius);
    font-size: 1rem;
    background: var(--card-bg);
    transition: border-color 0.2s;
    outline: none;
  }

  .search-bar input:focus {
    border-color: var(--primary);
  }

  .search-bar .search-icon {
    position: absolute;
    left: 16px;
    top: 50%;
    transform: translateY(-50%);
    font-size: 1.1rem;
    opacity: 0.4;
  }

  /* Filter tabs */
  .filter-row {
    display: flex;
    gap: 8px;
    margin-bottom: 20px;
    overflow-x: auto;
    padding-bottom: 4px;
  }

  .filter-btn {
    padding: 8px 16px;
    border: 1.5px solid var(--border);
    border-radius: 20px;
    background: var(--card-bg);
    font-size: 0.85rem;
    cursor: pointer;
    white-space: nowrap;
    transition: all 0.2s;
    color: var(--text-light);
  }

  .filter-btn:hover { border-color: var(--primary); color: var(--primary); }
  .filter-btn.active { background: var(--primary); color: white; border-color: var(--primary); }

  /* Cards */
  .card-list { display: flex; flex-direction: column; gap: 16px; }

  .card {
    background: var(--card-bg);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    padding: 20px;
    transition: transform 0.15s, box-shadow 0.15s;
    position: relative;
    border-left: 4px solid var(--primary);
  }

  .card:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(0,0,0,0.12); }

  .card-header {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    margin-bottom: 10px;
  }

  .card-name {
    font-size: 1.2rem;
    font-weight: 700;
    color: var(--text);
  }

  .card-badge {
    font-size: 0.75rem;
    padding: 3px 10px;
    border-radius: 12px;
    font-weight: 600;
    white-space: nowrap;
  }

  .badge-visited { background: #d8f3dc; color: var(--visited); }
  .badge-want { background: #fde8e0; color: var(--want); }

  .card-type {
    display: inline-block;
    font-size: 0.78rem;
    color: var(--primary);
    background: #fff3e6;
    padding: 2px 10px;
    border-radius: 8px;
    margin-bottom: 10px;
    font-weight: 600;
  }

  .card-info {
    display: flex;
    flex-direction: column;
    gap: 6px;
    font-size: 0.88rem;
    color: var(--text-light);
  }

  .card-info span { display: flex; align-items: center; gap: 6px; }
  .card-info .icon { width: 18px; text-align: center; flex-shrink: 0; }

  .card-note {
    margin-top: 12px;
    padding: 10px 14px;
    background: #f8f9fa;
    border-radius: 8px;
    font-size: 0.85rem;
    color: var(--text);
    line-height: 1.5;
    white-space: pre-wrap;
  }

  .card-actions {
    display: flex;
    gap: 8px;
    margin-top: 14px;
    flex-wrap: wrap;
  }

  .btn-sm {
    padding: 6px 14px;
    border: none;
    border-radius: 8px;
    font-size: 0.8rem;
    cursor: pointer;
    font-weight: 600;
    transition: opacity 0.2s;
  }

  .btn-sm:hover { opacity: 0.85; }

  .btn-map { background: #4285f4; color: white; text-decoration: none; display: inline-block; }
  .btn-edit { background: #f8f9fa; color: var(--text); }
  .btn-delete { background: #fee2e2; color: #dc2626; }

  .empty-state {
    text-align: center;
    padding: 60px 20px;
    color: var(--text-light);
  }

  .empty-state .emoji { font-size: 3rem; margin-bottom: 12px; }
  .empty-state p { font-size: 1rem; }

  /* FAB */
  .fab {
    position: fixed;
    bottom: 24px;
    right: 24px;
    width: 56px;
    height: 56px;
    border-radius: 50%;
    background: linear-gradient(135deg, var(--primary), var(--primary-light));
    color: white;
    border: none;
    font-size: 1.8rem;
    cursor: pointer;
    box-shadow: 0 4px 16px rgba(232,93,4,0.35);
    display: flex;
    align-items: center;
    justify-content: center;
    transition: transform 0.2s;
    z-index: 90;
  }

  .fab:hover { transform: scale(1.1); }

  /* Modal */
  .modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.4);
    z-index: 200;
    display: none;
    align-items: flex-end;
    justify-content: center;
    backdrop-filter: blur(2px);
  }

  .modal-overlay.open { display: flex; }

  .modal {
    background: var(--card-bg);
    width: 100%;
    max-width: 600px;
    max-height: 90vh;
    border-radius: 20px 20px 0 0;
    padding: 24px 20px 32px;
    overflow-y: auto;
    animation: slideUp 0.3s ease;
  }

  @keyframes slideUp {
    from { transform: translateY(100%); }
    to { transform: translateY(0); }
  }

  .modal h2 {
    font-size: 1.3rem;
    margin-bottom: 20px;
    text-align: center;
    color: var(--primary);
  }

  .form-group {
    margin-bottom: 14px;
  }

  .form-group label {
    display: block;
    font-size: 0.85rem;
    font-weight: 600;
    margin-bottom: 5px;
    color: var(--text);
  }

  .form-group input,
  .form-group select,
  .form-group textarea {
    width: 100%;
    padding: 10px 14px;
    border: 1.5px solid var(--border);
    border-radius: 10px;
    font-size: 0.95rem;
    outline: none;
    transition: border-color 0.2s;
    font-family: inherit;
    background: #fafafa;
  }

  .form-group input:focus,
  .form-group select:focus,
  .form-group textarea:focus {
    border-color: var(--primary);
    background: white;
  }

  .form-group textarea { resize: vertical; min-height: 70px; }

  .form-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
  }

  .radio-group {
    display: flex;
    gap: 12px;
  }

  .radio-group label {
    display: flex;
    align-items: center;
    gap: 6px;
    font-weight: 400;
    cursor: pointer;
    padding: 8px 16px;
    border: 1.5px solid var(--border);
    border-radius: 10px;
    flex: 1;
    justify-content: center;
    transition: all 0.2s;
  }

  .radio-group input { display: none; }
  .radio-group input:checked + span { color: var(--primary); }
  .radio-group label:has(input:checked) {
    border-color: var(--primary);
    background: #fff3e6;
  }

  .btn-row {
    display: flex;
    gap: 10px;
    margin-top: 20px;
  }

  .btn {
    flex: 1;
    padding: 13px;
    border: none;
    border-radius: 10px;
    font-size: 1rem;
    font-weight: 600;
    cursor: pointer;
    transition: opacity 0.2s;
  }

  .btn-primary { background: linear-gradient(135deg, var(--primary), var(--primary-light)); color: white; }
  .btn-secondary { background: #f1f3f5; color: var(--text); }
  .btn:hover { opacity: 0.9; }

  .count-bar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 14px;
    font-size: 0.85rem;
    color: var(--text-light);
  }

  @media (min-width: 600px) {
    .modal {
      border-radius: 20px;
      margin: auto;
      max-height: 85vh;
    }
    .modal-overlay { align-items: center; }
  }
  /* Google Autocomplete dropdown */
  .pac-container {
    border-radius: 10px;
    border: 1.5px solid var(--border);
    box-shadow: var(--shadow);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans TC", sans-serif;
    z-index: 10000 !important;
    margin-top: 4px;
  }

  .pac-item {
    padding: 10px 14px;
    font-size: 0.9rem;
    cursor: pointer;
    border-bottom: 1px solid #f0f0f0;
  }

  .pac-item:hover { background: #fff3e6; }
  .pac-item-selected { background: #fff3e6; }

  .auto-filled {
    border-color: var(--primary) !important;
    background: #fffbf5 !important;
  }
</style>
<script async src="https://maps.googleapis.com/maps/api/js?key=AIzaSyB4LqWiRWyN0v7bP4mnP04RUR3kCsWdRP4&libraries=places&language=zh-TW&callback=initAutocomplete"></script>
</head>
<body>

<header>
  <h1>美食地圖</h1>
  <p>收藏你的口袋名單</p>
</header>

<div class="container">
  <div class="search-bar">
    <span class="search-icon">&#128269;</span>
    <input type="text" id="searchInput" placeholder="搜尋店名、區域、捷運站...">
  </div>

  <div class="filter-row" id="filterRow">
    <button class="filter-btn active" data-filter="all">全部</button>
    <button class="filter-btn" data-filter="餐廳">餐廳</button>
    <button class="filter-btn" data-filter="酒吧">酒吧</button>
    <button class="filter-btn" data-filter="小吃">小吃</button>
    <button class="filter-btn" data-filter="咖啡廳">咖啡廳</button>
    <button class="filter-btn" data-filter="visited">已去過</button>
    <button class="filter-btn" data-filter="want">想去</button>
  </div>

  <div class="count-bar">
    <span id="countText">共 0 間店家</span>
  </div>

  <div class="card-list" id="cardList"></div>
</div>

<button class="fab" id="fabBtn" title="新增店家">+</button>

<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <h2 id="modalTitle">新增店家</h2>
    <form id="shopForm">
      <input type="hidden" id="editId">
      <div class="form-group">
        <label>店家名稱 *</label>
        <input type="text" id="fName" required placeholder="例：鼎泰豐" autocomplete="off">
        <div id="autoFillHint" style="font-size:0.75rem;color:var(--primary);margin-top:4px;display:none;">自動帶入資料中...</div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>類型 *</label>
          <select id="fType" required>
            <option value="餐廳">餐廳</option>
            <option value="酒吧">酒吧</option>
            <option value="小吃">小吃</option>
            <option value="咖啡廳">咖啡廳</option>
          </select>
        </div>
        <div class="form-group">
          <label>區域</label>
          <input type="text" id="fArea" placeholder="例：大安區">
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>捷運站</label>
          <input type="text" id="fMrt" placeholder="例：東門站">
        </div>
        <div class="form-group">
          <label>營業時間</label>
          <input type="text" id="fHours" placeholder="例：11:00-21:00">
        </div>
      </div>
      <div class="form-group">
        <label>地址</label>
        <input type="text" id="fAddress" placeholder="例：台北市大安區信義路二段...">
      </div>
      <div class="form-group">
        <label>狀態</label>
        <div class="radio-group">
          <label><input type="radio" name="fStatus" value="want" checked><span>想去</span></label>
          <label><input type="radio" name="fStatus" value="visited"><span>已去過</span></label>
        </div>
      </div>
      <div class="form-group">
        <label>心得筆記</label>
        <textarea id="fNote" placeholder="記錄你的美食體驗..."></textarea>
      </div>
      <div class="btn-row">
        <button type="button" class="btn btn-secondary" id="cancelBtn">取消</button>
        <button type="submit" class="btn btn-primary" id="submitBtn">儲存</button>
      </div>
    </form>
  </div>
</div>

<script>
const LS_KEY = 'foodmap_shops';
const typeEmoji = { '餐廳': '🍽️', '酒吧': '🍸', '小吃': '🍜', '咖啡廳': '☕' };
const GAPI_KEY = 'AIzaSyB4LqWiRWyN0v7bP4mnP04RUR3kCsWdRP4';

let shops = JSON.parse(localStorage.getItem(LS_KEY) || '[]');
let activeFilter = 'all';
let autocomplete = null;
let placesService = null;

const $ = id => document.getElementById(id);
const cardList = $('cardList');
const searchInput = $('searchInput');
const modalOverlay = $('modalOverlay');
const shopForm = $('shopForm');

function save() {
  localStorage.setItem(LS_KEY, JSON.stringify(shops));
}

function mapsUrl(address, name) {
  const q = encodeURIComponent(address || name);
  return `https://www.google.com/maps/search/?api=1&query=${q}`;
}

/* ── Google Places Autocomplete ── */
function initAutocomplete() {
  const input = $('fName');
  autocomplete = new google.maps.places.Autocomplete(input, {
    types: ['establishment'],
    componentRestrictions: { country: 'tw' },
    fields: ['name', 'formatted_address', 'address_components', 'geometry', 'opening_hours', 'types', 'place_id']
  });

  // Create a dummy div for PlacesService (needed for nearbySearch)
  placesService = new google.maps.places.PlacesService(document.createElement('div'));

  autocomplete.addListener('place_changed', onPlaceSelected);
}
window.initAutocomplete = initAutocomplete;

function onPlaceSelected() {
  const place = autocomplete.getPlace();
  if (!place || !place.name) return;

  const hint = $('autoFillHint');
  hint.style.display = 'block';
  hint.textContent = '自動帶入資料中...';

  // Fill name
  $('fName').value = place.name;

  // Fill address
  if (place.formatted_address) {
    $('fAddress').value = place.formatted_address;
    $('fAddress').classList.add('auto-filled');
  }

  // Extract district (區域) from address_components
  if (place.address_components) {
    const district = place.address_components.find(c =>
      c.types.includes('administrative_area_level_3') ||
      c.types.includes('sublocality_level_1') ||
      c.types.includes('sublocality')
    );
    if (district) {
      $('fArea').value = district.long_name;
      $('fArea').classList.add('auto-filled');
    }
  }

  // Fill opening hours
  if (place.opening_hours && place.opening_hours.weekday_text) {
    const today = new Date().getDay();
    const idx = today === 0 ? 6 : today - 1;
    const todayHours = place.opening_hours.weekday_text[idx];
    if (todayHours) {
      const timePart = todayHours.replace(/^.*?:\s*/, '');
      $('fHours').value = timePart;
      $('fHours').classList.add('auto-filled');
    }
  }

  // Auto-detect type from Google types
  if (place.types) {
    const t = place.types;
    if (t.includes('bar') || t.includes('night_club')) {
      $('fType').value = '酒吧';
    } else if (t.includes('cafe')) {
      $('fType').value = '咖啡廳';
    } else if (t.includes('restaurant') || t.includes('food')) {
      $('fType').value = '餐廳';
    }
    $('fType').classList.add('auto-filled');
  }

  // Find nearest MRT station
  if (place.geometry && place.geometry.location) {
    findNearestMRT(place.geometry.location);
  }

  setTimeout(() => {
    hint.textContent = '已自動帶入 Google Maps 資料';
    setTimeout(() => { hint.style.display = 'none'; }, 2000);
  }, 500);
}

function findNearestMRT(location) {
  const request = {
    location: location,
    radius: 1000,
    type: 'transit_station',
    keyword: '捷運'
  };

  placesService.nearbySearch(request, (results, status) => {
    if (status === google.maps.places.PlacesServiceStatus.OK && results.length > 0) {
      // Find the closest one
      let closest = results[0];
      let closestDist = getDistance(location, results[0].geometry.location);

      for (let i = 1; i < results.length; i++) {
        const d = getDistance(location, results[i].geometry.location);
        if (d < closestDist) {
          closestDist = d;
          closest = results[i];
        }
      }

      let name = closest.name;
      // Normalize: ensure it ends with 站
      if (!name.includes('站')) name += '站';
      // Clean up common prefixes
      name = name.replace(/^捷運/, '');

      $('fMrt').value = name;
      $('fMrt').classList.add('auto-filled');
    }
  });
}

function getDistance(p1, p2) {
  const lat1 = p1.lat(), lng1 = p1.lng();
  const lat2 = p2.lat(), lng2 = p2.lng();
  return Math.sqrt(Math.pow(lat1 - lat2, 2) + Math.pow(lng1 - lng2, 2));
}

/* ── Render ── */
function renderCards() {
  const query = searchInput.value.trim().toLowerCase();
  let filtered = shops.filter(s => {
    if (activeFilter !== 'all' && activeFilter !== 'visited' && activeFilter !== 'want') {
      if (s.type !== activeFilter) return false;
    }
    if (activeFilter === 'visited' && s.status !== 'visited') return false;
    if (activeFilter === 'want' && s.status !== 'want') return false;
    if (query) {
      const hay = [s.name, s.type, s.area, s.mrt, s.address, s.note].join(' ').toLowerCase();
      return hay.includes(query);
    }
    return true;
  });

  $('countText').textContent = `共 ${filtered.length} 間店家`;

  if (filtered.length === 0) {
    cardList.innerHTML = `
      <div class="empty-state">
        <div class="emoji">🗺️</div>
        <p>${query || activeFilter !== 'all' ? '找不到符合的店家' : '還沒有店家，點右下角 + 新增吧！'}</p>
      </div>`;
    return;
  }

  cardList.innerHTML = filtered.map(s => `
    <div class="card">
      <div class="card-header">
        <div class="card-name">${esc(s.name)}</div>
        <span class="card-badge ${s.status === 'visited' ? 'badge-visited' : 'badge-want'}">
          ${s.status === 'visited' ? '✓ 已去過' : '☆ 想去'}
        </span>
      </div>
      <div class="card-type">${typeEmoji[s.type] || ''} ${esc(s.type)}</div>
      <div class="card-info">
        ${s.area ? `<span><span class="icon">📍</span>${esc(s.area)}</span>` : ''}
        ${s.mrt ? `<span><span class="icon">🚇</span>${esc(s.mrt)}</span>` : ''}
        ${s.address ? `<span><span class="icon">🏠</span>${esc(s.address)}</span>` : ''}
        ${s.hours ? `<span><span class="icon">🕐</span>${esc(s.hours)}</span>` : ''}
      </div>
      ${s.note ? `<div class="card-note">${esc(s.note)}</div>` : ''}
      <div class="card-actions">
        <a class="btn-sm btn-map" href="${mapsUrl(s.address, s.name)}" target="_blank" rel="noopener">Google Maps</a>
        <button class="btn-sm btn-edit" onclick="editShop('${s.id}')">編輯</button>
        <button class="btn-sm btn-delete" onclick="deleteShop('${s.id}')">刪除</button>
      </div>
    </div>
  `).join('');
}

function esc(str) {
  if (!str) return '';
  const d = document.createElement('div');
  d.textContent = str;
  return d.innerHTML;
}

function clearAutoFill() {
  document.querySelectorAll('.auto-filled').forEach(el => el.classList.remove('auto-filled'));
  $('autoFillHint').style.display = 'none';
}

function openModal(shop) {
  clearAutoFill();
  $('modalTitle').textContent = shop ? '編輯店家' : '新增店家';
  $('editId').value = shop ? shop.id : '';
  $('fName').value = shop ? shop.name : '';
  $('fType').value = shop ? shop.type : '餐廳';
  $('fArea').value = shop ? shop.area : '';
  $('fMrt').value = shop ? shop.mrt : '';
  $('fHours').value = shop ? shop.hours : '';
  $('fAddress').value = shop ? shop.address : '';
  $('fNote').value = shop ? shop.note : '';
  document.querySelector(`input[name="fStatus"][value="${shop ? shop.status : 'want'}"]`).checked = true;
  modalOverlay.classList.add('open');
  setTimeout(() => $('fName').focus(), 100);
}

function closeModal() {
  modalOverlay.classList.remove('open');
  shopForm.reset();
  clearAutoFill();
}

window.editShop = function(id) {
  const s = shops.find(x => x.id === id);
  if (s) openModal(s);
};

window.deleteShop = function(id) {
  if (!confirm('確定要刪除這間店家嗎？')) return;
  shops = shops.filter(x => x.id !== id);
  save();
  renderCards();
};

$('fabBtn').addEventListener('click', () => openModal(null));
$('cancelBtn').addEventListener('click', closeModal);

modalOverlay.addEventListener('click', e => {
  if (e.target === modalOverlay) closeModal();
});

shopForm.addEventListener('submit', e => {
  e.preventDefault();
  const id = $('editId').value || Date.now().toString(36) + Math.random().toString(36).slice(2, 6);
  const data = {
    id,
    name: $('fName').value.trim(),
    type: $('fType').value,
    area: $('fArea').value.trim(),
    mrt: $('fMrt').value.trim(),
    hours: $('fHours').value.trim(),
    address: $('fAddress').value.trim(),
    status: document.querySelector('input[name="fStatus"]:checked').value,
    note: $('fNote').value.trim(),
  };
  const idx = shops.findIndex(x => x.id === id);
  if (idx >= 0) shops[idx] = data;
  else shops.unshift(data);
  save();
  closeModal();
  renderCards();
});

searchInput.addEventListener('input', renderCards);

document.querySelectorAll('.filter-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    activeFilter = btn.dataset.filter;
    renderCards();
  });
});

renderCards();
</script>
</body>
</html>
